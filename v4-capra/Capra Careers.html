document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-family:'Inter Tight',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\nimg,svg{display:block;max-width:100%}\na{color:inherit;text-decoration:none}\nem{font-family:'Instrument Serif',serif;font-style:italic;color:var(--green);font-weight:400}\n.green{color:var(--green)}\n.mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}\n\n/* NAV */\n.nav{position:sticky;top:0;z-index:50;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;padding:16px 32px;background:rgba(31,58,92,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-dark);color:var(--paper)}\n.logo{display:flex;align-items:center;gap:12px;font-family:'Inter Tight';font-weight:600;font-size:14px;letter-spacing:.18em}\n.logo svg{width:32px;height:32px}\n.nav-links{justify-self:center;display:flex;gap:28px;font-size:13px}\n.nav-links a{color:var(--paper);opacity:.7;transition:opacity .2s, color .2s}\n.nav-links a:hover,.nav-links a.active{opacity:1;color:var(--green)}\n.nav-cta{justify-self:end;display:flex;align-items:center;gap:14px}\n.status{display:inline-flex;align-items:center;gap:8px;color:var(--mute-2) !important}\n.status i{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}\n.btn-primary{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;background:var(--green);color:#fff;border-radius:2px;font-size:12px;font-weight:600;letter-spacing:.05em;transition:background .2s}\n.btn-primary:hover{background:var(--green-2)}\n.arrow{display:inline-block;transition:transform .2s}\n.btn-primary:hover .arrow,.btn-accent:hover .arrow,.btn-line:hover .arrow,.btn-line-light:hover .arrow,.inline-link:hover .arrow{transform:translateX(4px)}\n\n/* HERO */\n.hero{background:var(--navy);color:var(--paper);padding:60px 40px 80px;border-bot :translateX(-50%)}}\n\n/* SECTIONS */\n.section{max-width:1600px;margin:0 auto;padding:120px 40px}\n.sec-head{display:grid;grid-template-columns:1fr 2fr;gap:40px 80px;padding-bottom:40px;border-bottom:1px solid var(--line);margin-bottom:64px;align-items:end}\n.eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);padding-top:6px}\n.hero-eyebrow{display:inline-block;margin-bottom:24px;color:var(--green) !important;padding:6px 0 8px;font-weight:700;font-size:18px;letter-spacing:.24em}\n.h-display{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:clamp(48px,6.4vw,104px);line-height:.95;letter-spacing:-.03em;margin:0;max-width:14ch;color:var(--navy)}\n.h-display em{color:var(--green);font-family:'Instrument Serif',serif;font-weight:400}\n\n/* PROBLEM */\n.prob-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:start}\n.prob-copy p{font-size:20px;line-height:1.55;color:var(--mute);margin:0 0 20px;max-width:44ch}\n.prob-copy p em{color:var(--green)}\n.stat-stack{display:grid;grid-template-columns:1fr 1fr;gap:20px}\n.stat{border:1px solid var(--line);padding:18px 24px 24px;background:#fff;position:relative;display:flex;flex-direction:column;gap:14px}\n.stat > .mono{color:var(--green) !important;font-size:11px;line-height:1.3;letter-spacing:.14em}\n.stat b{font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(56px,5vw,84px);line-height:1;letter-spacing:-.02em;display:block;margin:0;color:var(--navy)}\n.stat b i{font-style:normal;color:var(--green);font-size:.75em}\n.stat .lab{font-size:14px;line-height:1.4;color:var(--mute);display:block;max-width:24ch}\n.stat .lab sup{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--mute-2);text-transform:uppercase;margin-top:6px}\n\n/* ADVANTAGE LIST (qualitative, no big numbers) */\n.adv-list{display:flex;flex-direction:column;border-top:1px solid var(--line)}\n.adv{d rtant}\n.cta-meta dd{margin:0;font-family:'Instrument Serif',serif;font-size:28px;letter-spacing:-.01em;color:var(--paper)}\n\n/* FOOTER */\n.foot{background:var(--navy-3);color:var(--paper);padding:60px 40px;display:grid;grid-template-columns:1fr 2fr;gap:40px;border-top:1px solid var(--line-dark)}\n.foot .logo{color:var(--paper);margin-bottom:14px}\n.foot .mono{color:var(--mute-2)}\n.foot-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}\n.foot-cols > div{display:flex;flex-direction:column;gap:8px}\n.foot-cols a{color:var(--paper);opacity:.7;font-size:14px}\n.foot-cols a:hover{opacity:1;color:var(--green)}\n.foot-cols .mono{margin-bottom:10px}\n\n/* SUB HERO */\n.subhero{padding:60px 40px 60px}\n\n/* JOBS / VALUES (careers) */\n.jobs{border-top:1px solid var(--line-strong)}\n.job{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:24px 24px;align-items:center;padding:24px 0;border-bottom:1px solid var(--line);transition:padding-left .3s ease, background .3s ease}\n.job:hover{padding-left:16px;background:var(--green-soft)}\n.job:hover h4{color:var(--green-2)}\n.job h4{font-family:'Inter Tight';font-weight:600;font-size:22px;margin:0;letter-spacing:-.01em;line-height:1.1;color:var(--navy);transition:color .2s}\n.job > span:nth-child(2){color:var(--mute);font-size:14px}\n.job-desc{grid-column:1/-1;color:var(--mute);font-size:15.5px;line-height:1.6;margin:4px 0 0;max-width:80ch}\n.values{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line-strong);border-bottom:1px solid var(--line-strong);background:#fff}\n.val{padding:32px;border-right:1px solid var(--line)}\n.val:last-child{border-right:none}\n.val h4{font-family:'Inter Tight';font-weight:600;font-size:22px;margin:0 0 10px;letter-spacing:-.01em;color:var(--navy)}\n.val p{font-size:15px;line-height:1.55;color:var(--mute);margin:0}\n\n@media (max-width: 1024px){\n  .sec-head,.hero-grid,.prob-grid,.layer,.team-callout{grid-template-columns:1fr}\n  .layer-img{aspect-ratio:16/9;max-width:560px;justify-self:start;width:100%}\n  .stat-stack,.panel-stats{grid-template-columns:1fr 1fr}\n  .team-grid{grid-template-columns:1fr 1fr}\n  .prod-pair,.foot,.foot-cols{grid-template-columns:1fr}\n  .fac-stats,.cta-meta,.values{grid-template-columns:1fr 1fr}\n  .tr-head,.tr-row{grid-template-columns:1fr 1fr;gap:8px}\n  .tr-head span:nth-child(n+3),.tr-row > *:nth-child(n+3){display:none}\n  .nav{grid-template-columns:1fr auto}.nav-links{display:none}\n  .nav-cta .status{display:none}\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<nav class=\"nav\">\n  <a class=\"logo\" href=\"home.html\">\n    <svg viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\n      <circle cx=\"32\" cy=\"32\" r=\"26\"><\u002Fcircle><path d=\"M14 46 L50 18\"><\u002Fpath><circle cx=\"32\" cy=\"32\" r=\"6\" fill=\"currentColor\"><\u002Fcircle>\n    <\u002Fsvg><span>CAPRA<\u002Fspan>\n  <\u002Fa>\n  <div class=\"nav-links\">\n    <a href=\"home.html\">Home<\u002Fa>\n    <a href=\"products.html\">Products<\u002Fa>\n    <a href=\"team.html\">About<\u002Fa>\n    <a href=\"careers.html\" class=\"active\">Careers<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"nav-cta\">\n    <a class=\"btn-primary\" href=\"mailto:info@caprabiosciences.com\">Contact <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<section class=\"hero subhero\">\n  <div class=\"hero-inner\">\n    <div class=\"hero-meta\">\n      <span class=\"mono\">005 / Careers<\u002Fspan>\n      <span class=\"mono\">Sterling, VA · on-site<\u002Fspan>\n      <span class=\"mono\">20-person team<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"display\" style=\"margin-bottom:24px\">Help us build the chemical factory of <em>the future.<\u002Fem><\u002Fh1>\n    <p class=\"sub\" style=\"max-width:64ch\">We hire engineers, scientists, and operators who can hold the whole stack in their head: molecule, reactor, factory, customer. If that's you, read on.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\">\n  <header class=\"sec-head\">\n    <span class=\"eyebrow\">Values<\u002Fspan>\n    <h2 class=\"h-display\">Three things <em>every Capra hire<\u002Fem> shares.<\u002Fh2>\n  <\u002Fheader>\n\n  <div class=\"values\">\n    <div class=\"val\">\n      <span class=\"mono green\">01 / Innovation<\u002Fspan>\n      <h4>Across disciplines<\u002Fh4>\n      <p>We don't have a \"biology team\" and a \"hardware team.\" We have one team that knows the whole stack and refuses to sit in a single lane.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"val\">\n      <span class=\"mono green\">02 / Accountability<\u002Fspan>\n      <h4>We ship what we promise<\u002Fh4>\n      <p>Every program has a clear owner, a clear scope, and a clear definition of done. Milestones move on the schedule we set, not the one we wish we had.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"val\">\n      <span class=\"mono green\">03 / Scientific Rigor<\u002Fspan>\n      <h4>Data over opinions<\u002Fh4>\n      <p>The reactor is the source of truth. We design experiments to be falsifiable, document what we run, and update our priors when the numbers say to.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" style=\"padding-top:0\">\n  <header class=\"sec-head\">\n    <span class=\"eyebrow\">Open roles<\u002Fspan>\n    <h2 class=\"h-display\">Hiring now in <em>Sterling, VA.<\u002Fem><\u002Fh2>\n  <\u002Fheader>\n\n  <div class=\"jobs\">\n    <div class=\"job\">\n      <h4>Analytical Chemist<\u002Fh4>\n      <span>Science · Chemistry<\u002Fspan>\n      <span>Sterling, VA · On-site<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <p class=\"job-desc\">You'll own the analytical methods that keep every program moving, quantifying products, intermediates, and impurities across our pipeline. We're looking for a chemist who can scope and develop new methods fast, and knows their way around chromatography (GC, GC-MS, HPLC, LC-MS), spectroscopy (UV-Vis, FTIR, NMR), and the wet-chemistry fundamentals to back them up. You'll work shoulder to shoulder with the strain, process, and downstream teams in the Sterling lab.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"note\" style=\"margin-top:48px\">Don't see your role? <em>Send us a note anyway<\u002Fem> — we're always interested in meeting strong engineers, scientists, and operators.<\u002Fp>\n<\u002Fsection>\n\n<!-- ROLES (kept for re-enable when we open hiring again) ====================\n<section class=\"section\" style=\"padding-top:0\">\n  <header class=\"sec-head\">\n    <span class=\"eyebrow\">Open roles<\u002Fspan>\n    <h2 class=\"h-display\">Hiring now in <em>Sterling, VA.<\u002Fem><\u002Fh2>\n  <\u002Fheader>\n\n  <div class=\"jobs\">\n    <div class=\"job\">\n      <h4>Senior Process Engineer — Bioreactor Scale-Up<\u002Fh4>\n      <span>Engineering · Hardware<\u002Fspan>\n      <span>Sterling, VA · On-site<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"job\">\n      <h4>Strain Engineer — Non-model Organisms<\u002Fh4>\n      <span>Science · Biology<\u002Fspan>\n      <span>Sterling, VA · On-site<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"job\">\n      <h4>Downstream Process Chemist<\u002Fh4>\n      <span>Science · Chemistry<\u002Fspan>\n      <span>Sterling, VA · On-site<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"job\">\n      <h4>Controls / Instrumentation Engineer<\u002Fh4>\n      <span>Engineering · Software<\u002Fspan>\n      <span>Sterling, VA · On-site<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"job\">\n      <h4>Manufacturing Operations Lead<\u002Fh4>\n      <span>Operations<\u002Fspan>\n      <span>Sterling, VA · On-site<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"job\">\n      <h4>Business Development — Pharma &amp; Personal Care<\u002Fh4>\n      <span>Commercial<\u002Fspan>\n      <span>Sterling, VA · Hybrid<\u002Fspan>\n      <a class=\"inline-link\" href=\"mailto:info@caprabiosciences.com\" style=\"margin:0\">Apply <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"note\" style=\"margin-top:48px\">Don't see your role? <em>Send us a note anyway.<\u002Fem><\u002Fp>\n<\u002Fsection>\n==========================================================================-->\n\n<section class=\"section\" style=\"padding-top:0\">\n  <header class=\"sec-head\">\n    <span class=\"eyebrow\">Benefits<\u002Fspan>\n    <h2 class=\"h-display\">What working at Capra <em>looks like.<\u002Fem><\u002Fh2>\n  <\u002Fheader>\n\n  <div class=\"fac-stats\">\n    <div><span class=\"mono\">Compensation<\u002Fspan><b>Competitive<\u002Fb><\u002Fdiv>\n    <div><span class=\"mono\">Equity<\u002Fspan><b>Stock options<\u002Fb><\u002Fdiv>\n    <div><span class=\"mono\">Healthcare<\u002Fspan><b>Medical · dental · vision<\u002Fb><\u002Fdiv>\n    <div><span class=\"mono\">Time off<\u002Fspan><b>15 vac · 10 holidays<\u002Fb><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section-cta\">\n  <div class=\"cta-inner\">\n    <span class=\"eyebrow\">Apply<\u002Fspan>\n    <h2 class=\"h-display\">Send us your CV.<\u002Fh2>\n    <p class=\"cta-sub\">All applications go to a real person, usually a co-founder. Tell us what you'd want to build at Capra and why.<\u002Fp>\n    <div class=\"cta-actions\">\n      <a class=\"btn-accent\" href=\"mailto:info@caprabiosciences.com\">info@caprabiosciences.com <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <a class=\"btn-line-light\" href=\"team.html\">Meet the team<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"foot\">\n  <div>\n    <div class=\"logo\">\n      <svg viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\n        <circle cx=\"32\" cy=\"32\" r=\"26\"><\u002Fcircle><path d=\"M14 46 L50 18\"><\u002Fpath><circle cx=\"32\" cy=\"32\" r=\"6\" fill=\"currentColor\"><\u002Fcircle>\n      <\u002Fsvg><span>CAPRA<\u002Fspan>\n    <\u002Fdiv>\n    <span class=\"mono\">101 International Drive, STE 100<br>Sterling VA, 20166<\u002Fspan><br><br>\n    <span class=\"mono\" style=\"color:var(--mute-2)\">© 2026 Capra Biosciences<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"foot-cols\">\n    <div><span class=\"mono\">Site<\u002Fspan><a href=\"home.html\">Home<\u002Fa><a href=\"products.html\">Products<\u002Fa><a href=\"team.html\">About<\u002Fa><a href=\"careers.html\">Careers<\u002Fa><\u002Fdiv>\n    <div><span class=\"mono\">Contact<\u002Fspan><a href=\"mailto:info@caprabiosciences.com\">info@caprabiosciences.com<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Reveal on scroll: add init class via JS so no-JS visitors see content,\n// then observe and add .in to trigger transition.\nconst targets = document.querySelectorAll('.hero, .section, .marquee');\ntargets.forEach(el=>el.classList.add('fade-init'));\nconst io = new IntersectionObserver((es)=>{\n  es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }});\n},{threshold:.08, rootMargin:'0px 0px -40px 0px'});\ntargets.forEach(el=>io.observe(el));\n// Safety: if anything still hasn't entered viewport after 1.5s on tall pages, reveal it\nsetTimeout(()=>{ targets.forEach(el=>el.classList.add('in')); }, 1800);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
